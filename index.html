<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipu</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: 'Outfit', sans-serif;
    user-select: none;
    transition: background-color 0.5s ease;
}
.glass {
    background: rgba(8, 18, 36, 0.5);
    backdrop-filter: blur(22px) saturate(1.4);
    -webkit-backdrop-filter: blur(22px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.1);
}
.glass-light {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
}
.bubble-her  { background:#f1f0f0; color:#1a1a2e; border-radius:18px 18px 18px 4px; }
.bubble-user { background:#2563eb; color:#fff;    border-radius:18px 18px 4px 18px; }
.scroll::-webkit-scrollbar { width: 4px; }
.scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius:99px; }
.scroll::-webkit-scrollbar-track { background: transparent; }
input[type="file"] { display: none; }
@keyframes breathe { 0%,100%{transform:scaleY(1) translateY(0)} 50%{transform:scaleY(1.013) translateY(-5px)} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes spinSlow{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.breathe    { animation: breathe 5s ease-in-out infinite; transform-origin: bottom center; }
.fade-up    { animation: fadeUp 0.28s ease forwards; }
.spin-slow  { animation: spinSlow 4s linear infinite; }
.char-img {
    position:absolute; bottom:0; left:0;
    width:100%; height:100%;
    object-fit: contain; object-position: bottom center;
    pointer-events: none; -webkit-user-drag: none;
}
#speech {
    transition: opacity 0.3s ease, transform 0.3s ease;
}
#speech.off { opacity:0; pointer-events:none; transform:translateY(8px); }
.upload-btn {
    display:block; padding:7px 10px; cursor:pointer; text-align:center;
    background:rgba(255,255,255,0.04); border:1px dashed rgba(255,255,255,0.18);
    border-radius:8px; font-size:10px; font-family:monospace;
    color:rgba(255,255,255,0.65); transition:all 0.2s;
}
.upload-btn:hover { background:rgba(255,255,255,0.1); border-color:#fcd34d; }
.upload-btn.ok    { background:rgba(52,211,153,0.12); border-color:#34d399; color:#34d399; }
.tab-on  { color:#fcd34d; border-bottom:2px solid #fcd34d; }
.tab-off { color:rgba(255,255,255,0.45); border-bottom:2px solid transparent; }
.tab-off:hover { color:rgba(255,255,255,0.8); }
</style>
</head>
<body id="body" style="background:#176580; color:white;">

<!-- PiP plumbing -->
<canvas id="pip-c" width="400" height="600" class="hidden" style="position:absolute"></canvas>
<video  id="pip-v" autoplay muted playsinline class="hidden" style="position:absolute"></video>

<!-- ── LOGO ── -->
<div class="absolute top-5 left-6 z-30 pointer-events-none">
    <span style="font-family:'Press Start 2P',monospace;font-size:20px;color:#fcd34d;
                 text-shadow:3px 3px 0 #92400e,-1px -1px 0 #b45309;">PIPU</span>
</div>

<!-- ── CHARACTER ── -->
<div class="absolute inset-0 z-0 flex items-end justify-center overflow-hidden pointer-events-none">

    <!-- speech bubble -->
    <div id="speech" class="off absolute z-20 pointer-events-none"
         style="bottom:62vh; left:50%; transform:translateX(-50%); max-width:min(460px,86vw);">
        <div class="glass-light rounded-2xl px-5 py-3.5 text-center shadow-xl relative">
            <p id="speech-txt" class="text-sm leading-relaxed text-white font-medium break-words"></p>
            <div style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
                 width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;
                 border-top:10px solid rgba(255,255,255,0.1);"></div>
        </div>
    </div>

    <!-- layers -->
    <div id="char" class="breathe pointer-events-auto cursor-pointer"
         style="position:relative;width:100%;height:90vh;"
         onclick="avatarClick()">
        <img id="l-body"  class="char-img" alt="">
        <img id="l-nose"  class="char-img" alt="">
        <img id="l-eyes"  class="char-img" alt="">
        <img id="l-mouth" class="char-img" alt="">
        <img id="l-expr"  class="char-img" alt="" style="display:none">
        <img id="l-blush" class="char-img" alt="" style="display:none">
    </div>
</div>

<!-- ── CHAT WINDOW ── -->
<div id="chat"
     class="absolute top-5 right-5 glass rounded-2xl shadow-2xl z-20 pointer-events-auto flex flex-col border border-white/10"
     style="width:330px;height:44vh;min-width:260px;min-height:250px;resize:both;overflow:hidden;
            transition:opacity 0.25s ease,transform 0.25s ease;">

    <div id="chat-hdr"
         class="flex items-center justify-between px-4 py-2.5 border-b border-white/10 cursor-move shrink-0 select-none"
         style="background:rgba(0,0,0,0.18);">
        <div class="flex gap-1.5">
            <span class="w-3 h-3 rounded-full bg-red-500/80 cursor-pointer"
                  onclick="showChat(false)" title="Fechar"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-500/80"></span>
            <span class="w-3 h-3 rounded-full bg-green-500/80"></span>
        </div>
        <span class="text-[11px] font-semibold text-white/60 tracking-widest uppercase">Mensagens</span>
        <div class="w-12"></div>
    </div>

    <div id="msgs" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2.5 scroll"
         style="background:rgba(0,0,0,0.08);">
        <div class="bubble-her self-start px-3.5 py-2 text-xs max-w-[82%] leading-relaxed shadow-sm">
            Olá! Sou a <strong>Pipu</strong>, assistente do Victor! 😊
        </div>
    </div>
</div>

<!-- ── DOCK ── -->
<div class="absolute bottom-5 left-0 right-0 flex justify-center px-4 z-30 pointer-events-none">
    <div class="glass pointer-events-auto rounded-2xl px-3 py-2.5 flex items-center gap-2
                w-full max-w-2xl border border-white/10 shadow-2xl">

        <!-- input row -->
        <div class="flex-1 flex items-center gap-1.5 bg-black/25 rounded-xl px-3 py-2 border border-white/5">
            <input id="inp" type="text" autocomplete="off"
                   class="flex-1 bg-transparent outline-none text-white placeholder-white/30 text-sm"
                   placeholder="Fala com a Pipu...">

            <button onclick="showChat(true)"
                    class="p-1.5 rounded-lg hover:bg-white/10 text-white/45 hover:text-yellow-300 transition-all"
                    title="Abrir chat">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button id="btn-pip"
                    class="p-1.5 rounded-lg hover:bg-white/10 text-white/45 hover:text-white transition-all"
                    title="Picture-in-Picture">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M14 10h7v7h-7z"/></svg>
            </button>
            <button id="btn-cfg"
                    class="p-1.5 rounded-lg hover:bg-white/10 text-white/45 hover:text-white transition-all"
                    title="Configurações">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>

        <!-- send -->
        <button id="btn-send"
                class="w-10 h-10 shrink-0 bg-yellow-400 hover:bg-yellow-300 active:scale-90 text-slate-900
                       rounded-xl flex items-center justify-center transition-all shadow-md">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>

        <!-- quick actions -->
        <div class="flex gap-1 shrink-0">
            <button onclick="quickAsk('Quem é o Victor?')"
                    class="p-2.5 rounded-xl hover:bg-white/10 text-white/45 hover:text-yellow-300 active:scale-90 transition-all"
                    title="Sobre Victor">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button onclick="window.open('https://github.com/Delta-1','_blank')"
                    class="p-2.5 rounded-xl hover:bg-white/10 text-white/45 hover:text-yellow-300 active:scale-90 transition-all"
                    title="GitHub">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            </button>
            <button onclick="window.open('https://instagram.com','_blank')"
                    class="p-2.5 rounded-xl hover:bg-white/10 text-white/45 hover:text-yellow-300 active:scale-90 transition-all"
                    title="Instagram">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect width="20" height="20" x="2" y="2" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            </button>
        </div>
    </div>
</div>

<!-- ── PASSWORD MODAL ── -->
<div id="pw-modal" style="display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;">
    <div class="absolute inset-0 bg-black/60" style="backdrop-filter:blur(8px);" onclick="closePw()"></div>
    <div class="relative glass-light rounded-2xl p-6 w-80 border border-white/15 z-10 text-center shadow-2xl">
        <p class="text-yellow-300 font-bold text-sm mb-1">🔐 Acesso Restrito</p>
        <p class="text-xs text-white/55 mb-4">Palavra-passe do estúdio</p>
        <input id="pw-inp" type="password" placeholder="Chave de acesso..."
               class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-center
                      text-white outline-none focus:border-yellow-400 font-mono mb-1.5 transition-colors">
        <p id="pw-err" class="text-xs text-red-400 font-bold mb-3 opacity-0 transition-opacity">Senha incorreta</p>
        <div class="flex gap-2 justify-center">
            <button onclick="closePw()" class="px-4 py-2 text-xs text-white/50 hover:text-white transition-colors">Cancelar</button>
            <button onclick="checkPw()"
                    class="px-5 py-2 bg-yellow-400 hover:bg-yellow-300 text-slate-900 text-xs font-bold rounded-xl transition-all active:scale-95">
                Entrar
            </button>
        </div>
    </div>
</div>

<!-- ── SETTINGS MODAL ── -->
<div id="cfg-modal" style="display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;">
    <div class="absolute inset-0 bg-black/55" style="backdrop-filter:blur(10px);" onclick="closeCfg()"></div>
    <div class="relative glass rounded-2xl w-full max-w-lg border border-white/10 z-10 shadow-2xl flex flex-col mx-4"
         style="max-height:85vh;">

        <div class="flex items-center justify-between px-5 py-4 border-b border-white/10 shrink-0">
            <h3 class="text-sm font-bold text-yellow-300 flex items-center gap-2">
                <svg class="w-4 h-4 spin-slow" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Estúdio Pipu
            </h3>
            <button onclick="closeCfg()" class="text-white/40 hover:text-white p-1 transition-colors">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <!-- tabs -->
        <div class="flex gap-4 px-5 border-b border-white/10 text-xs font-mono shrink-0">
            <button id="t-brain" onclick="switchTab('brain')" class="py-3 tab-on transition-colors">🧠 IA & VISUAL</button>
            <button id="t-persona" onclick="switchTab('persona')" class="py-3 tab-off transition-colors">🎨 PERSONA</button>
        </div>

        <div class="flex-1 overflow-y-auto scroll p-5 space-y-4 text-sm">

            <!-- brain tab -->
            <div id="tab-brain">
                <div class="space-y-1.5">
                    <label class="block text-[10px] font-bold text-white/55 uppercase tracking-widest font-mono">Chave API Gemini</label>
                    <input id="inp-api" type="password" placeholder="AIza..."
                           class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white
                                  outline-none focus:border-yellow-400 font-mono placeholder-white/20 transition-colors">
                </div>
                <div class="space-y-1.5 mt-4">
                    <label class="block text-[10px] font-bold text-white/55 uppercase tracking-widest font-mono">Personalidade</label>
                    <textarea id="inp-pers" rows="3" placeholder="Como a Pipu deve agir..."
                              class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white
                                     outline-none focus:border-yellow-400 placeholder-white/20 resize-none scroll transition-colors"></textarea>
                </div>
                <div class="mt-4 pt-4 border-t border-white/10 space-y-2">
                    <label class="block text-[10px] font-bold text-white/55 uppercase tracking-widest font-mono">Cor de Fundo</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="inp-color"
                               class="w-10 h-10 rounded-lg cursor-pointer border-0 bg-transparent">
                        <div class="flex gap-2">
                            <button onclick="setBg('#176580')" class="w-6 h-6 rounded-full bg-[#176580] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                            <button onclick="setBg('#1a2744')" class="w-6 h-6 rounded-full bg-[#1a2744] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                            <button onclick="setBg('#2d4a3e')" class="w-6 h-6 rounded-full bg-[#2d4a3e] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                            <button onclick="setBg('#3d2c5c')" class="w-6 h-6 rounded-full bg-[#3d2c5c] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                            <button onclick="setBg('#111827')" class="w-6 h-6 rounded-full bg-[#111827] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- persona tab -->
            <div id="tab-persona" class="hidden space-y-4">
                <div id="drop-zone"
                     class="border-2 border-dashed border-white/20 rounded-2xl p-5 text-center cursor-pointer
                            hover:border-yellow-400 hover:bg-white/5 transition-all"
                     ondragover="event.preventDefault();this.classList.add('border-yellow-400','bg-white/5')"
                     ondragleave="this.classList.remove('border-yellow-400','bg-white/5')"
                     ondrop="onDrop(event)">
                    <div class="text-3xl mb-1.5">📂</div>
                    <p class="text-xs font-bold">Arrasta a pasta DESIGN/ aqui</p>
                    <p class="text-[10px] text-white/40 mt-0.5">ou</p>
                    <label class="mt-2 inline-block px-3 py-1.5 bg-yellow-400 hover:bg-yellow-300 text-slate-900
                                  text-[10px] font-bold rounded-lg cursor-pointer transition-all active:scale-95">
                        Selecionar Pasta
                        <input type="file" webkitdirectory directory multiple onchange="onFolderInput(event)">
                    </label>
                </div>

                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold text-white/55 uppercase font-mono">Emoção:</span>
                    <select id="emo-sel" onchange="refreshUploadUI()"
                            class="flex-1 bg-black/30 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white outline-none">
                        <option value="neutral">Neutral</option>
                        <option value="happy">Feliz</option>
                        <option value="sad">Triste</option>
                        <option value="brava">Raiva</option>
                        <option value="shocked">Surpresa</option>
                        <option value="sono">Sono</option>
                        <option value="vergonha">Vergonha</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <label id="lbl-body"        class="upload-btn" data-name="Corpo">        Corpo        <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'body')"></label>
                    <label id="lbl-nose"        class="upload-btn" data-name="Nariz">        Nariz        <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'nose')"></label>
                    <label id="lbl-eyes_open"   class="upload-btn" data-name="Olhos Abertos">Olhos Abertos<input type="file" accept=".png,.svg" onchange="uploadSlot(event,'eyes_open')"></label>
                    <label id="lbl-eyes_closed" class="upload-btn" data-name="Olhos Fechados">Olhos Fechados<input type="file" accept=".png,.svg" onchange="uploadSlot(event,'eyes_closed')"></label>
                    <label id="lbl-mouth_closed" class="upload-btn" data-name="Boca Fechada"> Boca Fechada <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'mouth_closed')"></label>
                    <label id="lbl-mouth_open"  class="upload-btn" data-name="Boca Aberta">  Boca Aberta  <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'mouth_open')"></label>
                    <label id="lbl-expression"  class="upload-btn" data-name="Expressão">    Expressão    <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'expression')"></label>
                    <label id="lbl-blush"       class="upload-btn" data-name="Blush">        Blush        <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'blush')"></label>
                </div>

                <button onclick="clearUploads()"
                        class="w-full py-2 text-[10px] font-bold text-red-400 border border-red-500/30
                               rounded-xl hover:bg-red-500/10 transition-all">
                    Limpar Imagens Customizadas
                </button>
            </div>
        </div>

        <div class="flex justify-end gap-2 px-5 py-3 border-t border-white/10 shrink-0">
            <button onclick="closeCfg()" class="px-4 py-2 text-xs text-white/50 hover:text-white transition-colors">Fechar</button>
            <button onclick="saveCfg()"
                    class="px-5 py-2 bg-yellow-400 hover:bg-yellow-300 text-slate-900 text-xs font-bold rounded-xl transition-all active:scale-95">
                Guardar
            </button>
        </div>
    </div>
</div>

<script>
// ── constants ──────────────────────────────────────────────────────────────
const LS_KEY  = 'pipu_api_key';
const LS_PERS = 'pipu_personality';
const LS_BG   = 'pipu_bg';
const LS_ST   = 'pipu_state';
const LS_BLK  = 'pipu_blocked';

// File paths matching the ACTUAL filenames in the repository
const A = {
    body:          'DESIGN/corpo/corpo%20padrao.png',
    nose:          'DESIGN/corpo/nariz%20padrao.png',
    eyes_neutral:  'DESIGN/olhos/padrao.png',
    eyes_happy:    'DESIGN/olhos/sorrindo.png',
    eyes_sad:      'DESIGN/olhos/tristes.png',
    eyes_shocked:  'DESIGN/olhos/arregalados.png',
    eyes_closed:   'DESIGN/olhos/fechados.png',
    mouth_closed:  'DESIGN/boca/boca%20padrao.png',
    mouth_open:    'DESIGN/boca/sorriso.png',
    mouth_shock:   'DESIGN/boca/boca%20inesperado.png',
};

const DEFAULT_ASSETS = {
    neutral:  { body:A.body, nose:A.nose, eyes_open:A.eyes_neutral, eyes_closed:A.eyes_closed, mouth_closed:A.mouth_closed, mouth_open:A.mouth_open,   expression:'', blush:'' },
    happy:    { body:A.body, nose:A.nose, eyes_open:A.eyes_happy,   eyes_closed:A.eyes_closed, mouth_closed:A.mouth_open,   mouth_open:A.mouth_open,   expression:'', blush:'' },
    sad:      { body:A.body, nose:A.nose, eyes_open:A.eyes_sad,     eyes_closed:A.eyes_closed, mouth_closed:A.mouth_closed, mouth_open:A.mouth_closed, expression:'', blush:'' },
    brava:    { body:A.body, nose:A.nose, eyes_open:A.eyes_sad,     eyes_closed:A.eyes_closed, mouth_closed:A.mouth_shock,  mouth_open:A.mouth_shock,  expression:'', blush:'' },
    shocked:  { body:A.body, nose:A.nose, eyes_open:A.eyes_shocked, eyes_closed:A.eyes_closed, mouth_closed:A.mouth_shock,  mouth_open:A.mouth_shock,  expression:'', blush:'' },
    sono:     { body:A.body, nose:A.nose, eyes_open:A.eyes_sad,     eyes_closed:A.eyes_closed, mouth_closed:A.mouth_closed, mouth_open:A.mouth_closed, expression:'', blush:'' },
    vergonha: { body:A.body, nose:A.nose, eyes_open:A.eyes_sad,     eyes_closed:A.eyes_closed, mouth_closed:A.mouth_closed, mouth_open:A.mouth_open,   expression:'', blush:'' },

// ── state ──────────────────────────────────────────────────────────────────
let apiKey      = localStorage.getItem(LS_KEY)  || '';
let personality = localStorage.getItem(LS_PERS) || '';
let bgColor     = localStorage.getItem(LS_BG)   || '#176580';
let isTyping    = false;
let isBlinking  = false;
let isBlocked   = localStorage.getItem(LS_BLK) === 'true';
let curEmo      = 'neutral';
let audioCtx    = null;
let pipActive   = false;
let chatVisible = true;

let persona = (() => {
    try {
        const s = localStorage.getItem(LS_ST);
        return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_ASSETS));

// ── DOM ────────────────────────────────────────────────────────────────────
const L = {

    eyes:  document.getElementById('l-eyes'),

};

// ── Expression system ──────────────────────────────────────────────────────
function setExpr(emo, talking = false) {
    curEmo = emo;
    const e = persona[emo] || persona.neutral;
    setSrc(L.body,  e.body);
    setSrc(L.nose,  e.nose);
    setSrc(L.eyes,  isBlinking ? e.eyes_closed : e.eyes_open);
    setSrc(L.mouth, talking ? e.mouth_open : e.mouth_closed);
    if (e.expression) { L.expr.style.display = ''; setSrc(L.expr, e.expression); }
    else L.expr.style.display = 'none';
    if (e.blush) { L.blush.style.display = ''; setSrc(L.blush, e.blush); }
    else L.blush.style.display = 'none';
}

function setSrc(img, src) {
    if (!src || img._cur === src) return;
    img._cur = src;
    img.src  = src;
}

// ── Blink ──────────────────────────────────────────────────────────────────
function scheduleBlink() {
    setTimeout(() => {
        if (!isTyping && !isBlocked && !isBlinking) {
            isBlinking = true;
            setExpr(curEmo, false);
            setTimeout(() => { isBlinking = false; setExpr(curEmo, isTyping); }, 140);
        }
        scheduleBlink();
    }, 3000 + Math.random() * 3000);
}
scheduleBlink();

// ── Audio ──────────────────────────────────────────────────────────────────
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function chirp() {
    try {
        initAudio();
        const now = audioCtx.currentTime;
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = [760,810,860,910,960,1020][Math.floor(Math.random()*6)];
        gain.gain.setValueAtTime(0.012, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.065);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.065);
    } catch {}
}

// ── Speak / typing animation ───────────────────────────────────────────────
function speak(msg) {
    isTyping = true;
    $stxt.textContent = '';
    $speech.classList.remove('off');
    const text = msg.text;
    let i = 0;
    function step() {
        if (i < text.length) {
            $stxt.textContent += text[i++];
            if (i % 2 === 0) { chirp(); setExpr(msg.emotion, true); }
            else setExpr(msg.emotion, false);
            setTimeout(step, 18 + Math.random() * 22);
        } else {
            isTyping = false;
            setExpr(msg.emotion, false);
            addBubble('her', text);
            setTimeout(() => { if (!isTyping) $speech.classList.add('off'); }, 4500);
        }
    }
    step();
}

// ── Chat bubbles ───────────────────────────────────────────────────────────
function addBubble(who, text) {
    const d = document.createElement('div');
    d.className = (who === 'her'
        ? 'bubble-her self-start'
        : 'bubble-user self-end')
        + ' px-3.5 py-2 text-xs max-w-[82%] leading-relaxed shadow-sm fade-up';
    d.textContent = text;
    $msgs.appendChild(d);
    $msgs.scrollTop = $msgs.scrollHeight;
}

];

const TOXIC = ['idiota','burra','odeio','bosta','merda','caralho','puta','lixo','feio','feia'];

// ── Process user message ───────────────────────────────────────────────────
async function process(text) {
    const t = text.toLowerCase().trim();

    if (isBlocked) { speak({ emotion:'brava', text:'Acesso bloqueado! 🔒' }); return; }

    if (TOXIC.some(w => t.includes(w))) {
        isBlocked = true;
        localStorage.setItem(LS_BLK, 'true');
        $inp.disabled = true;
        $inp.placeholder = '🔒 Bloqueado';
        speak({ emotion:'brava', text:'Não gostei disso! Bye bye! 💢' });
        return;
    }

    if (apiKey) {
        $stxt.textContent = 'Pensando... ✨';
        $speech.classList.remove('off');
        try {
            const reply = await callGemini(text);
            speak(reply);
            return;
        } catch (err) {
            $speech.classList.add('off');
            isTyping = false;
        }
    }

    for (const item of DB) {
        if (item.kw.some(k => t.includes(k))) { speak(item); return; }
    }

    speak({ emotion:'neutral', text:'Podes perguntar-me sobre o Victor ou configurar a API Gemini nas definições! ⚙️' });
}

// ── Gemini API ─────────────────────────────────────────────────────────────
async function callGemini(query) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
    const sys  = personality
        ? `Você é a Pipu, assistente fofa do Victor. Responda em pt-BR. ${personality}\nSempre retorne JSON: {"emotion":"neutral"|"happy"|"sad"|"brava"|"shocked"|"sono"|"vergonha","text":"..."}`
        : `Você é a Pipu, assistente virtual fofa e carismática criada pelo desenvolvedor Victor. Responda em português do Brasil de forma alegre. Sempre retorne JSON válido: {"emotion":"neutral"|"happy"|"sad"|"brava"|"shocked"|"sono"|"vergonha","text":"resposta aqui"}`;
    const body = {
        contents: [{ parts:[{ text:query }] }],
        systemInstruction: { parts:[{ text:sys }] },
        generationConfig: {
            responseMimeType: 'application/json',
            responseSchema: {
                type:'OBJECT',
                properties: {
                    emotion:{ type:'STRING', enum:['neutral','happy','sad','brava','shocked','sono','vergonha'] },
                    text:   { type:'STRING' }
                },
                required:['emotion','text']
            }
        }
    };
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return JSON.parse(data.candidates[0].content.parts[0].text);
}

// ── Submit ─────────────────────────────────────────────────────────────────
async function submit() {
    const text = $inp.value.trim();
    if (!text || isTyping) return;
    $inp.value = '';
    initAudio();
    addBubble('user', text);
    isTyping = true;
    setTimeout(() => { isTyping = false; process(text); }, 280);
}

document.getElementById('btn-send').addEventListener('click', submit);
$inp.addEventListener('keypress', e => { if (e.key === 'Enter') submit(); });

function quickAsk(q) {
    if (isTyping || isBlocked) return;
    $inp.value = q;
    submit();
}

// ── Drag chat window ───────────────────────────────────────────────────────
(function() {
    const el = $chat, hdr = document.getElementById('chat-hdr');
    let mx=0, my=0;
    hdr.addEventListener('mousedown', e => {
        if (e.target.closest('button')) return;
        mx = e.clientX; my = e.clientY;
        function drag(e) {
            const dx = mx - e.clientX, dy = my - e.clientY;
            mx = e.clientX; my = e.clientY;
            el.style.top   = Math.max(0, el.offsetTop  - dy) + 'px';
            el.style.left  = Math.max(0, el.offsetLeft - dx) + 'px';
            el.style.right = 'auto';
        }
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', () => document.removeEventListener('mousemove', drag), { once:true });
    });
})();

// ── Upload system ──────────────────────────────────────────────────────────
const SLOTS = ['body','nose','eyes_open','eyes_closed','mouth_closed','mouth_open','expression','blush'];

function uploadSlot(event, slot) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const emo = document.getElementById('emo-sel').value;
        if (!persona[emo]) persona[emo] = { ...DEFAULT_ASSETS[emo] };
        persona[emo][slot] = ev.target.result;
        try { localStorage.setItem(LS_ST, JSON.stringify(persona)); } catch { alert('Memória cheia!'); }
        setExpr(curEmo, isTyping);
        refreshUploadUI();
    };
    reader.readAsDataURL(file);
}

function refreshUploadUI() {
    const emo = document.getElementById('emo-sel').value;
    const e   = persona[emo] || DEFAULT_ASSETS[emo];
    SLOTS.forEach(s => {
        const lbl = document.getElementById('lbl-' + s);
        if (!lbl) return;
        const val  = e[s];
        const name = lbl.dataset.name || s;
        const has  = val && val.startsWith('data:');
        lbl.className = 'upload-btn' + (has ? ' ok' : '');
        lbl.firstChild.textContent = name + (has ? ' ✓' : '');
    });
}

function clearUploads() {
    persona = JSON.parse(JSON.stringify(DEFAULT_ASSETS));
    localStorage.setItem(LS_ST, JSON.stringify(persona));
    setExpr(curEmo, isTyping);
    refreshUploadUI();
}

async function onFolderInput(e) { await batchFiles(Array.from(e.target.files)); }
async function onDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('border-yellow-400','bg-white/5');
    let files = [];
    for (const item of e.dataTransfer.items) {
        const entry = item.webkitGetAsEntry?.();
        if (entry) files = files.concat(await walkDir(entry));
    }
    if (!files.length) files = Array.from(e.dataTransfer.files);
    batchFiles(files);
}
async function walkDir(entry) {
    if (entry.isFile) return [await new Promise(r => entry.file(r))];
    const reader = entry.createReader();
    const entries = await new Promise(r => reader.readEntries(r));
    let out = [];
    for (const en of entries) out = out.concat(await walkDir(en));
    return out;
}
async function batchFiles(files) {
    let n = 0;
    await Promise.all(files.map(f => new Promise(res => {
        const p = (f.webkitRelativePath || f.name).toLowerCase();
        if (!/\.(png|svg|jpg|jpeg)$/.test(p)) { res(); return; }
        const rd = new FileReader();
        rd.onload = ev => { if (mapFile(p, ev.target.result)) n++; res(); };
        rd.readAsDataURL(f);
    })));
    localStorage.setItem(LS_ST, JSON.stringify(persona));
    setExpr(curEmo, isTyping);
    refreshUploadUI();
    speak({ emotion:'happy', text:`Importei ${n} ficheiro(s)! 🎨` });
}
function mapFile(p, data) {
    const has = (...w) => w.some(x => p.includes(x));
    let ok = false;
    if (has('corpo') && !has('olho','boca','nariz')) { Object.values(persona).forEach(e => e.body=data); ok=true; }
    if (has('nariz')) { Object.values(persona).forEach(e => e.nose=data); ok=true; }
    if (has('olho','eye')) {
        if      (has('sorri','feliz','happy'))          { persona.happy.eyes_open=data; ok=true; }
        else if (has('arregal','shock','surpresa'))     { persona.shocked.eyes_open=data; ok=true; }
        else if (has('trist','sad'))                    { ['sad','brava','sono','vergonha'].forEach(k=>persona[k].eyes_open=data); ok=true; }
        else if (has('fechad','closed','blink'))        { Object.values(persona).forEach(e=>e.eyes_closed=data); ok=true; }
        else                                            { persona.neutral.eyes_open=data; ok=true; }
    }
    if (has('boca','mouth')) {
        if      (has('sorri','sorriso','happy'))        { ['happy'].forEach(k=>{persona[k].mouth_closed=persona[k].mouth_open=data;}); ok=true; }
        else if (has('inespe','shock','brava'))         { ['shocked','brava'].forEach(k=>{persona[k].mouth_closed=persona[k].mouth_open=data;}); ok=true; }
        else                                            { ['neutral','sad','sono','vergonha'].forEach(k=>persona[k].mouth_closed=data); ok=true; }
    }
    if (has('blush','envergon')) { persona.vergonha.blush=data; ok=true; }
    return ok;
}

// ── Picture-in-Picture ─────────────────────────────────────────────────────
const pipC   = document.getElementById('pip-c');
const pipV   = document.getElementById('pip-v');
const pipCtx = pipC.getContext('2d');
try { pipV.srcObject = pipC.captureStream(24); pipV.play(); } catch {}

function drawPip() {
    if (!pipActive) return;
    pipCtx.fillStyle = bgColor;
    pipCtx.fillRect(0, 0, pipC.width, pipC.height);
    [L.body, L.nose, L.eyes, L.mouth].forEach(img => {
        if (img.complete && img.naturalWidth) pipCtx.drawImage(img, 0, 0, pipC.width, pipC.height);
    });
    requestAnimationFrame(drawPip);
}
document.getElementById('btn-pip').addEventListener('click', async () => {
    initAudio();
    try {
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture(); pipActive = false;
        } else {
            pipActive = true; drawPip();
            await pipV.requestPictureInPicture();
        }
    } catch { pipActive = false; }
});

setExpr('neutral');
if (isBlocked) { $inp.disabled = true; $inp.placeholder = '🔒 Bloqueado'; }
