<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipu — Portfólio do Victor</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100vw; height:100vh; overflow:hidden; font-family:'Outfit',sans-serif; user-select:none; transition:background-color .5s ease; }
.glass       { background:rgba(8,18,36,.5); backdrop-filter:blur(22px) saturate(1.4); -webkit-backdrop-filter:blur(22px) saturate(1.4); border:1px solid rgba(255,255,255,.1); }
.glass-light { background:rgba(255,255,255,.07); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,.12); }
.bubble-her  { background:#f1f0f0; color:#1a1a2e; border-radius:18px 18px 18px 4px; }
.bubble-user { background:#2563eb; color:#fff;    border-radius:18px 18px 4px 18px; }
.scroll::-webkit-scrollbar { width:4px; }
.scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:99px; }
.scroll::-webkit-scrollbar-track { background:transparent; }
input[type="file"] { display:none; }
@keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes spinSlow{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes micPulse{ 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 70%{box-shadow:0 0 0 10px rgba(239,68,68,0)} }
.fade-up   { animation:fadeUp .28s ease forwards; }
.spin-slow { animation:spinSlow 4s linear infinite; }
.mic-active { animation:micPulse 1.2s infinite; background:#ef4444 !important; color:#fff !important; }
.char-img { position:absolute; bottom:0; left:0; width:100%; height:100%; object-fit:contain; object-position:bottom center; pointer-events:none; -webkit-user-drag:none; }
#speech { transition:opacity .3s ease,transform .3s ease; }
#speech.off { opacity:0; pointer-events:none; transform:translateY(8px); }
.upload-btn { display:block; padding:7px 10px; cursor:pointer; text-align:center; background:rgba(255,255,255,.04); border:1px dashed rgba(255,255,255,.18); border-radius:8px; font-size:10px; font-family:monospace; color:rgba(255,255,255,.65); transition:all .2s; }
.upload-btn:hover { background:rgba(255,255,255,.1); border-color:#fcd34d; }
.upload-btn.ok { background:rgba(52,211,153,.12); border-color:#34d399; color:#34d399; }
.tab-on  { color:#fcd34d; border-bottom:2px solid #fcd34d; }
.tab-off { color:rgba(255,255,255,.45); border-bottom:2px solid transparent; }
.tab-off:hover { color:rgba(255,255,255,.8); }
.dock-btn { padding:10px; border-radius:12px; color:rgba(255,255,255,.45); transition:all .2s; }
.dock-btn:hover { background:rgba(255,255,255,.1); color:#fcd34d; }
.dock-btn:active { transform:scale(.9); }
/* Spotify widget */
#spotify-widget { transition:opacity .3s ease,transform .3s ease; }
#spotify-widget.off { opacity:0; pointer-events:none; transform:translateY(8px); }
</style>
</head>
<body id="body" style="background:#176580;color:white;">

<!-- PiP plumbing -->
<canvas id="pip-c" width="400" height="400" class="hidden" style="position:absolute"></canvas>
<video  id="pip-v" autoplay muted playsinline class="hidden" style="position:absolute"></video>

<!-- Screen capture (hidden) -->
<video id="screen-v" autoplay muted playsinline style="display:none;position:absolute"></video>
<canvas id="screen-c" style="display:none;position:absolute"></canvas>

<!-- ── CHARACTER ── -->
<div class="absolute inset-0 z-0 flex items-end justify-center overflow-hidden pointer-events-none">
    <!-- speech bubble -->
    <div id="speech" class="off absolute z-20 pointer-events-none"
         style="bottom:62vh;left:50%;transform:translateX(-50%);max-width:min(460px,86vw);">
        <div class="glass-light rounded-2xl px-5 py-3.5 text-center shadow-xl relative">
            <p id="speech-txt" class="text-sm leading-relaxed text-white font-medium break-words"></p>
            <div style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid rgba(255,255,255,.1);"></div>
        </div>
    </div>
    <!-- layers -->
    <div id="char" class="pointer-events-auto cursor-pointer"
         style="position:relative;width:100%;height:90vh;"
         onclick="avatarClick()">
        <img id="l-body"  class="char-img" alt="">
        <img id="l-nose"  class="char-img" alt="">
        <img id="l-eyes"  class="char-img" alt="">
        <img id="l-mouth" class="char-img" alt="">
        <img id="l-expr"  class="char-img" alt="" style="display:none">
        <img id="l-blush" class="char-img" alt="" style="display:none">
    </div>
</div>

<!-- ── CHAT WINDOW ── -->
<div id="chat"
     class="absolute top-5 right-5 glass rounded-2xl shadow-2xl z-20 pointer-events-auto flex flex-col border border-white/10"
     style="width:330px;height:44vh;min-width:260px;min-height:250px;resize:both;overflow:hidden;transition:opacity .25s ease,transform .25s ease;">
    <div id="chat-hdr" class="flex items-center justify-between px-4 py-2.5 border-b border-white/10 cursor-move shrink-0 select-none" style="background:rgba(0,0,0,.18);">
        <div class="flex gap-1.5">
            <span class="w-3 h-3 rounded-full bg-red-500/80 cursor-pointer" onclick="showChat(false)"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-500/80"></span>
            <span class="w-3 h-3 rounded-full bg-green-500/80"></span>
        </div>
        <span class="text-[11px] font-semibold text-white/60 tracking-widest uppercase">Mensagens</span>
        <div class="w-12"></div>
    </div>
    <div id="msgs" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2.5 scroll" style="background:rgba(0,0,0,.08);">
        <div class="bubble-her self-start px-3.5 py-2 text-xs max-w-[82%] leading-relaxed shadow-sm">
            Olá! Sou a <strong>Pipu</strong>, assistente do Victor! 😊
        </div>
    </div>
</div>

<!-- ── SPOTIFY WIDGET ── -->
<div id="spotify-widget" class="off absolute bottom-28 left-5 z-30 pointer-events-auto" style="width:280px;">
    <div class="glass rounded-2xl border border-white/10 overflow-hidden shadow-2xl">
        <div class="flex items-center gap-2 px-3 py-2.5" style="background:rgba(30,215,96,.15);">
            <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            <span class="text-xs font-bold text-white/90">Spotify do Victor</span>
            <button onclick="document.getElementById('spotify-widget').classList.add('off')" class="ml-auto text-white/40 hover:text-white transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <iframe id="spotify-iframe"
                style="border-radius:0;border:none;display:block;"
                src="https://open.spotify.com/embed/user/victor?utm_source=generator&theme=0"
                width="280" height="152"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"></iframe>
        <div class="px-3 py-2 text-[10px] text-white/40 text-center">
            <a href="https://open.spotify.com/user/victor" target="_blank" class="hover:text-white/70 transition-colors underline">Abrir no Spotify ↗</a>
        </div>
    </div>
</div>

<!-- ── DOCK ── -->
<div class="absolute bottom-5 left-0 right-0 flex justify-center px-4 z-30 pointer-events-none">
    <div class="glass pointer-events-auto rounded-2xl px-3 py-2.5 flex items-center gap-2 w-full max-w-2xl border border-white/10 shadow-2xl">

        <div class="flex-1 flex items-center gap-1 bg-black/25 rounded-xl px-3 py-2 border border-white/5">
            <input id="inp" type="text" autocomplete="off"
                   class="flex-1 bg-transparent outline-none text-white placeholder-white/30 text-sm"
                   placeholder="Fala com a Pipu...">

            <!-- Mic -->
            <button id="btn-mic" class="dock-btn" title="Falar por microfone">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <!-- Chat toggle -->
            <button onclick="showChat(true)" class="dock-btn" title="Abrir chat">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <!-- Screen vision -->
            <button id="btn-vision" class="dock-btn" title="Pipu vê o teu ecrã">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <!-- PiP -->
            <button id="btn-pip" class="dock-btn" title="Picture-in-Picture">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M14 10h7v7h-7z"/></svg>
            </button>
            <!-- Settings -->
            <button id="btn-cfg" class="dock-btn" title="Configurações">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>

        <!-- Send -->
        <button id="btn-send" class="w-10 h-10 shrink-0 bg-yellow-400 hover:bg-yellow-300 active:scale-90 text-slate-900 rounded-xl flex items-center justify-center transition-all shadow-md">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>

        <!-- Quick actions -->
        <div class="flex gap-1 shrink-0">
            <button onclick="quickAsk('Quem é o Victor?')" class="dock-btn" title="Sobre Victor">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button onclick="window.open('https://github.com/Delta-1','_blank')" class="dock-btn" title="GitHub">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            </button>
            <button onclick="window.open('https://instagram.com/V_ctorsz','_blank')" class="dock-btn" title="Instagram">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect width="20" height="20" x="2" y="2" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            </button>
            <button onclick="toggleSpotify()" class="dock-btn" title="Spotify">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12.5c2.5-1 5.5-1 8 0M7 9c3-1.2 7-1.2 10 0M9 16c2-0.8 4-0.8 6 0"/></svg>
            </button>
        </div>
    </div>
</div>

<!-- ── PASSWORD MODAL ── -->
<div id="pw-modal" style="display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;">
    <div class="absolute inset-0 bg-black/60" style="backdrop-filter:blur(8px);" onclick="closePw()"></div>
    <div class="relative glass-light rounded-2xl p-6 w-80 border border-white/15 z-10 text-center shadow-2xl">
        <p class="text-yellow-300 font-bold text-sm mb-1">🔐 Acesso Restrito</p>
        <p class="text-xs text-white/55 mb-4">Palavra-passe do estúdio</p>
        <input id="pw-inp" type="password" placeholder="Chave de acesso..."
               class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-center text-white outline-none focus:border-yellow-400 font-mono mb-1.5 transition-colors">
        <p id="pw-err" class="text-xs text-red-400 font-bold mb-3 opacity-0">Senha incorreta</p>
        <div class="flex gap-2 justify-center">
            <button onclick="closePw()" class="px-4 py-2 text-xs text-white/50 hover:text-white transition-colors">Cancelar</button>
            <button onclick="checkPw()" class="px-5 py-2 bg-yellow-400 hover:bg-yellow-300 text-slate-900 text-xs font-bold rounded-xl transition-all active:scale-95">Entrar</button>
        </div>
    </div>
</div>

<!-- ── SETTINGS MODAL ── -->
<div id="cfg-modal" style="display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;">
    <div class="absolute inset-0 bg-black/55" style="backdrop-filter:blur(10px);" onclick="closeCfg()"></div>
    <div class="relative glass rounded-2xl w-full max-w-lg border border-white/10 z-10 shadow-2xl flex flex-col mx-4" style="max-height:85vh;">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/10 shrink-0">
            <h3 class="text-sm font-bold text-yellow-300 flex items-center gap-2">
                <svg class="w-4 h-4 spin-slow" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Estúdio Pipu
            </h3>
            <button onclick="closeCfg()" class="text-white/40 hover:text-white p-1 transition-colors">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="flex gap-4 px-5 border-b border-white/10 text-xs font-mono shrink-0">
            <button id="t-visual" onclick="switchTab('visual')" class="py-3 tab-on transition-colors">🎨 VISUAL</button>
            <button id="t-persona" onclick="switchTab('persona')" class="py-3 tab-off transition-colors">🖼️ PERSONA</button>
        </div>
        <div class="flex-1 overflow-y-auto scroll p-5 space-y-4 text-sm">

            <!-- visual tab -->
            <div id="tab-visual">
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-white/55 uppercase tracking-widest font-mono">Cor de Fundo</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="inp-color" class="w-10 h-10 rounded-lg cursor-pointer border-0 bg-transparent">
                        <div class="flex gap-2">
                            <button onclick="setBg('#176580')" class="w-6 h-6 rounded-full bg-[#176580] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                            <button onclick="setBg('#1a2744')" class="w-6 h-6 rounded-full bg-[#1a2744] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                            <button onclick="setBg('#2d4a3e')" class="w-6 h-6 rounded-full bg-[#2d4a3e] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                            <button onclick="setBg('#3d2c5c')" class="w-6 h-6 rounded-full bg-[#3d2c5c] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                            <button onclick="setBg('#111827')" class="w-6 h-6 rounded-full bg-[#111827] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- persona tab -->
            <div id="tab-persona" class="hidden space-y-4">
                <div id="drop-zone"
                     class="border-2 border-dashed border-white/20 rounded-2xl p-5 text-center cursor-pointer hover:border-yellow-400 hover:bg-white/5 transition-all"
                     ondragover="event.preventDefault();this.classList.add('border-yellow-400','bg-white/5')"
                     ondragleave="this.classList.remove('border-yellow-400','bg-white/5')"
                     ondrop="onDrop(event)">
                    <div class="text-3xl mb-1.5">📂</div>
                    <p class="text-xs font-bold">Arrasta a pasta DESIGN/ aqui</p>
                    <label class="mt-2 inline-block px-3 py-1.5 bg-yellow-400 hover:bg-yellow-300 text-slate-900 text-[10px] font-bold rounded-lg cursor-pointer transition-all active:scale-95">
                        Selecionar Pasta
                        <input type="file" webkitdirectory directory multiple onchange="onFolderInput(event)">
                    </label>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold text-white/55 uppercase font-mono">Emoção:</span>
                    <select id="emo-sel" onchange="refreshUploadUI()" class="flex-1 bg-black/30 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white outline-none">
                        <option value="neutral">Neutral</option><option value="happy">Feliz</option>
                        <option value="sad">Triste</option><option value="brava">Raiva</option>
                        <option value="shocked">Surpresa</option><option value="sono">Sono</option>
                        <option value="vergonha">Vergonha</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <label id="lbl-body"         class="upload-btn" data-name="Corpo">         Corpo         <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'body')"></label>
                    <label id="lbl-nose"         class="upload-btn" data-name="Nariz">         Nariz         <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'nose')"></label>
                    <label id="lbl-eyes_open"    class="upload-btn" data-name="Olhos Abertos"> Olhos Abertos <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'eyes_open')"></label>
                    <label id="lbl-eyes_closed"  class="upload-btn" data-name="Olhos Fechados">Olhos Fechados<input type="file" accept=".png,.svg" onchange="uploadSlot(event,'eyes_closed')"></label>
                    <label id="lbl-mouth_closed" class="upload-btn" data-name="Boca Fechada">  Boca Fechada  <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'mouth_closed')"></label>
                    <label id="lbl-mouth_open"   class="upload-btn" data-name="Boca Aberta">   Boca Aberta   <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'mouth_open')"></label>
                    <label id="lbl-expression"   class="upload-btn" data-name="Expressão">     Expressão     <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'expression')"></label>
                    <label id="lbl-blush"        class="upload-btn" data-name="Blush">         Blush         <input type="file" accept=".png,.svg" onchange="uploadSlot(event,'blush')"></label>
                </div>

}

// ── Gemini API ────────────────────────────────────────────────────────────
async function callGemini(query, key, imageBase64 = null) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
    const sys = `${pipuPersonality}\n\n${victorInfo}\n\nREGRAS IMPORTANTES:\n- RESPONDA SEMPRE a pergunta diretamente. Nunca diga "você pode me perguntar sobre X" — apenas responda.\n- Use as informações acima para responder perguntas sobre o Victor, seus projetos, suas redes sociais, ou qualquer outro assunto.\n- Se não souber algo específico, responda de forma criativa e fofa mas sem redirecionar.\n- Seja direta, animada e concisa (máx 2 frases).\n\nSempre retorne JSON válido: {"emotion":"neutral"|"happy"|"sad"|"brava"|"shocked"|"sono"|"vergonha","text":"resposta aqui"}`;
    const parts = [{ text: query }];
    if (imageBase64) parts.push({ inline_data:{ mime_type:'image/jpeg', data:imageBase64 } });
    const body = {
        contents: [{ parts }],
        systemInstruction: { parts:[{ text:sys }] },
        generationConfig: {
            responseMimeType:'application/json',
            responseSchema:{ type:'OBJECT', properties:{ emotion:{type:'STRING',enum:['neutral','happy','sad','brava','shocked','sono','vergonha']}, text:{type:'STRING'} }, required:['emotion','text'] }
        }
    };
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return JSON.parse(data.candidates[0].content.parts[0].text);
}

const SLOTS = ['body','nose','eyes_open','eyes_closed','mouth_closed','mouth_open','expression','blush'];
function uploadSlot(event, slot) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const emo = document.getElementById('emo-sel').value;

        setExpr(curEmo, isTyping); refreshUploadUI();
    };
    reader.readAsDataURL(file);
}
function refreshUploadUI() {
    const emo = document.getElementById('emo-sel').value;
    const e = persona[emo] || DA[emo];
    SLOTS.forEach(s => {
        const lbl = document.getElementById('lbl-'+s); if (!lbl) return;
        const has = e[s] && e[s].startsWith('data:');
        lbl.className = 'upload-btn'+(has?' ok':'');
        lbl.firstChild.textContent = (lbl.dataset.name||s) + (has?' ✓':'');
    });
}
function clearUploads() {

async function onFolderInput(e) { await batchFiles(Array.from(e.target.files)); }
async function onDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('border-yellow-400','bg-white/5');
    let files = [];
    for (const item of e.dataTransfer.items) {
        const entry = item.webkitGetAsEntry?.();
        if (entry) files = files.concat(await walkDir(entry));
    }
    if (!files.length) files = Array.from(e.dataTransfer.files);
    batchFiles(files);
}
async function walkDir(entry) {
    if (entry.isFile) return [await new Promise(r => entry.file(r))];
    const reader = entry.createReader();
    const entries = await new Promise(r => reader.readEntries(r));
    let out = [];
    for (const en of entries) out = out.concat(await walkDir(en));
    return out;
}
async function batchFiles(files) {
    let n = 0;
    await Promise.all(files.map(f => new Promise(res => {
        const p = (f.webkitRelativePath||f.name).toLowerCase();
        if (!/\.(png|svg|jpg|jpeg)$/.test(p)) { res(); return; }
        const rd = new FileReader();
        rd.onload = ev => { if (mapFile(p, ev.target.result)) n++; res(); };
        rd.readAsDataURL(f);
    })));
    localStorage.setItem(LS_ST, JSON.stringify(persona));
    setExpr(curEmo, isTyping); refreshUploadUI();
    speak({ emotion:'happy', text:`Importei ${n} ficheiro(s)! 🎨` });
}
function mapFile(p, data) {
    const has = (...w) => w.some(x => p.includes(x)); let ok=false;
    if (has('corpo') && !has('olho','boca','nariz')) { Object.values(persona).forEach(e=>e.body=data); ok=true; }
    if (has('nariz')) { Object.values(persona).forEach(e=>e.nose=data); ok=true; }
    if (has('olho','eye')) {
        if (has('sorri','feliz','happy'))       { persona.happy.eyes_open=data; ok=true; }
        else if (has('arregal','shock'))        { persona.shocked.eyes_open=data; ok=true; }
        else if (has('trist','sad'))            { ['sad','brava','sono','vergonha'].forEach(k=>persona[k].eyes_open=data); ok=true; }
        else if (has('fechad','closed','blink')){ Object.values(persona).forEach(e=>e.eyes_closed=data); ok=true; }
        else { persona.neutral.eyes_open=data; ok=true; }
    }
    if (has('boca','mouth')) {
        if (has('sorri','sorriso','happy'))  { persona.happy.mouth_closed=persona.happy.mouth_open=data; ok=true; }
        else if (has('inespe','shock','brava')) { ['shocked','brava'].forEach(k=>{persona[k].mouth_closed=persona[k].mouth_open=data;}); ok=true; }
        else { ['neutral','sad','sono','vergonha'].forEach(k=>persona[k].mouth_closed=data); ok=true; }
    }
    if (has('blush','envergon')) { persona.vergonha.blush=data; ok=true; }
    return ok;
}

// ── PiP ──────────────────────────────────────────────────────────────────
const pipC = document.getElementById('pip-c'), pipV = document.getElementById('pip-v');
const pipCtx = pipC.getContext('2d');
try { pipV.srcObject = pipC.captureStream(24); pipV.play(); } catch {}
function drawPip() {
    if (!pipActive) return;
    pipCtx.fillStyle = bgColor; pipCtx.fillRect(0,0,pipC.width,pipC.height);
    [L.body,L.nose,L.eyes,L.mouth].forEach(img=>{ if(img.complete&&img.naturalWidth) pipCtx.drawImage(img,0,0,pipC.width,pipC.height); });
    requestAnimationFrame(drawPip);
}
document.getElementById('btn-pip').addEventListener('click', async () => {
    initAudio();
    try {
        if (document.pictureInPictureElement) { await document.exitPictureInPicture(); pipActive=false; }
        else { pipActive=true; drawPip(); await pipV.requestPictureInPicture(); }
    } catch { pipActive=false; }
});

// ── Boot ──────────────────────────────────────────────────────────────────
document.body.style.backgroundColor = bgColor;
setExpr('neutral');
if (isBlocked) { $inp.disabled=true; $inp.placeholder='🔒 Bloqueado'; }

// Carrega personalidade dos ficheiros do GitHub
loadPersonalityFiles();

setTimeout(() => {
    if (!isTyping) speak({ emotion:'happy', text:'Olá! Sou a Pipu, assistente do Victor (Delts)! Podes falar comigo ou clicar em mim! 💛' });
}, 900);
</script>
